name: Build MomoAIBot Tweak

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: |
          brew install ldid

      - name: Download iOS 15.0 SDK
        run: |
          curl -L -o /tmp/iPhoneOS15.0.sdk.tar.xz https://github.com/theos/sdks/releases/download/master/iPhoneOS15.0.sdk.tar.xz
          mkdir -p $HOME/theos/sdks
          tar -xJf /tmp/iPhoneOS15.0.sdk.tar.xz -C $HOME/theos/sdks
          echo "SDK installed at $HOME/theos/sdks/iPhoneOS15.0.sdk"

      - name: Build Tweak
        run: |
          export THEOS=$HOME/theos
          export THEOS_SDK=15.0
          make clean
          make package
        working-directory: ${{ github.workspace }}

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: momo-aibot-deb
          path: packages/*.deb
          if-no-files-found: error
